substitutions:
  _REGISTRY: ${LOCATION}-docker.pkg.dev/${PROJECT_ID}/anthropic-agents
  _TAG: dev
  _ANT_VERSION: 1.9.1

options:
  machineType: E2_HIGHCPU_8

steps:
  - id: worker
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - --build-arg=ANT_VERSION=${_ANT_VERSION}
      - -t
      - ${_REGISTRY}/claude-agent-worker:${_TAG}
      - src/worker

  - id: dispatcher
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -t
      - ${_REGISTRY}/anthropic-dispatcher:${_TAG}
      - src/dispatcher

  - id: stats-adapter
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -t
      - ${_REGISTRY}/anthropic-stats-adapter:${_TAG}
      - src/stats-adapter

images:
  - ${_REGISTRY}/claude-agent-worker:${_TAG}
  - ${_REGISTRY}/anthropic-dispatcher:${_TAG}
  - ${_REGISTRY}/anthropic-stats-adapter:${_TAG}
