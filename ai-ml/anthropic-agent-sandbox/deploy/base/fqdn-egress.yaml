# [START gke_aiml_anthropic_agent_sandbox_network_policy]
# FQDNNetworkPolicy is allow-list only; pair with a default-deny NetworkPolicy.
apiVersion: networking.gke.io/v1alpha1
kind: FQDNNetworkPolicy
metadata:
  name: claude-agent-worker-egress
spec:
  podSelector:
    matchLabels:
      app: claude-agent-worker
  egress:
    - matches:
        - name: api.anthropic.com
        - name: storage.googleapis.com
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claude-agent-worker-default-deny
spec:
  podSelector:
    matchLabels:
      app: claude-agent-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only the dispatcher may post a session binding to a warm pod.
    - from:
        - podSelector:
            matchLabels:
              app: dispatcher
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS carve-out so the FQDN match above can resolve.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # GKE metadata server, for the GCS FUSE sidecar (see README Step 4).
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
# [END gke_aiml_anthropic_agent_sandbox_network_policy]
