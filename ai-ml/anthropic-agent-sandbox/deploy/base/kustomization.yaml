apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agent-sandbox

resources:
  - namespace.yaml
  - serviceaccount-worker.yaml
  - sandbox-template.yaml
  - sandbox-warmpool.yaml
  - fqdn-egress.yaml
  - dispatcher.yaml
  - stats-adapter.yaml

configurations:
  - kustomize-config.yaml

configMapGenerator:
  - name: anthropic-env
    options:
      disableNameSuffixHash: true
    literals:
      - environment_id=PATCHED_BY_OVERLAY
      - session_bucket=PATCHED_BY_OVERLAY
