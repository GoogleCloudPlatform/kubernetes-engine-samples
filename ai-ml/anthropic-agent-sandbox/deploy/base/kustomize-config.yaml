# Teach kustomize where the container image lives inside the SandboxTemplate
# CRD so `kustomize edit set image` rewrites it alongside the Deployments.
images:
  - path: spec/podTemplate/spec/containers[]/image
    kind: SandboxTemplate
  - path: spec/podTemplate/spec/initContainers[]/image
    kind: SandboxTemplate
