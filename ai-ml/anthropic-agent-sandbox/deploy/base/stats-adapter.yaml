apiVersion: v1
kind: ServiceAccount
metadata:
  name: stats-adapter
  annotations:
    iam.gke.io/gcp-service-account: PATCHED_BY_OVERLAY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stats-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stats-adapter
  template:
    metadata:
      labels:
        app: stats-adapter
    spec:
      serviceAccountName: stats-adapter
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: stats-adapter
          image: anthropic-stats-adapter
          imagePullPolicy: Always
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: latest
            - name: ANTHROPIC_ENVIRONMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: anthropic-env
                  key: environment_id
            - name: POLL_INTERVAL_SECONDS
              value: "15"
            - name: METRIC_TYPE
              value: custom.googleapis.com/anthropic/work_depth
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
