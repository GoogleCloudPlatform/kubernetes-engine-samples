apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# params.env / params.yaml are generated by `make deploy` from your .env.
configMapGenerator:
  - name: anthropic-env
    behavior: merge
    envs:
      - params.env

replacements:
  - source:
      kind: ConfigMap
      name: anthropic-env
      fieldPath: data.session_bucket
    targets:
      - select:
          group: extensions.agents.x-k8s.io
          kind: SandboxTemplate
          name: claude-agent-worker
        fieldPaths:
          - spec.podTemplate.spec.volumes.[name=session-outputs-gcs].csi.volumeAttributes.bucketName

patches:
  - path: params.yaml
  - target:
      group: extensions.agents.x-k8s.io
      version: v1alpha1
      kind: SandboxWarmPool
      name: claude-agent-worker
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: stats-adapter
    patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: stats-adapter
