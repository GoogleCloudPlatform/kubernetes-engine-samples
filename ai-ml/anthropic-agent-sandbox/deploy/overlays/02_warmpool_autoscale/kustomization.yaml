apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agent-sandbox

resources:
- ../../base
- scale.yaml

configMapGenerator:
- behavior: merge
  envs:
  - params.env
  name: anthropic-env

replacements:
- source:
    fieldPath: data.session_bucket
    kind: ConfigMap
    name: anthropic-env
  targets:
  - fieldPaths:
    - spec.podTemplate.spec.volumes.[name=session-outputs-gcs].csi.volumeAttributes.bucketName
    select:
      group: extensions.agents.x-k8s.io
      kind: SandboxTemplate
      name: claude-agent-worker

patches:
- path: params.yaml
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value: {name: DIRECT_PATCH, value: "true"}
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value: {name: SANDBOX_NAMESPACE, value: agent-sandbox}
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value: {name: WARMPOOL_MIN, value: "2"}
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value: {name: WARMPOOL_MAX, value: "20"}
  target:
    kind: Deployment
    name: stats-adapter
