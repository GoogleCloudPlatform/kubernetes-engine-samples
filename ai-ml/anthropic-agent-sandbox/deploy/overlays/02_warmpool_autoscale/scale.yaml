# stats-adapter patches SandboxWarmPool /scale directly (HPA would need a metrics adapter).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stats-adapter
rules:
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxwarmpools/scale"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stats-adapter
subjects:
  - kind: ServiceAccount
    name: stats-adapter
roleRef:
  kind: Role
  name: stats-adapter
  apiGroup: rbac.authorization.k8s.io
