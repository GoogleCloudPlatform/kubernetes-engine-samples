# [START gke_ai_ml_ray_ephemeral_job_autoscaling]
apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: ephemeral-gpu-job-autoscaling
  annotations:
    kueue.x-k8s.io/elastic-job: "true"
  labels:
    # Route this job through Kueue
    kueue.x-k8s.io/queue-name: user-queue
spec:
  # The Python command to run
  entrypoint: |
    python -c "
    import ray, time, socket, os
    ray.init()
    print('Cluster resources:', ray.cluster_resources())
    def log_task_info(task_name):
        group_name = os.environ.get('RAY_NODE_TYPE_NAME')
        ip = socket.gethostbyname(socket.gethostname())
        print(f'[{group_name}] {task_name} Task running on node with IP: {ip}')
        return ip
    # Define tasks assigned to each workgroup using custom resources
    @ray.remote(resources={'group-reservation': 1})
    def task_reservation():
        ip = log_task_info('Reservation')
        time.sleep(5)
        return ip
    @ray.remote(resources={'group-dws-flex': 1})
    def task_dws_flex():
        ip = log_task_info('DWS Flex')
        time.sleep(5)
        return ip
    @ray.remote(resources={'group-spot': 1})
    def task_spot():
        ip = log_task_info('Spot')
        time.sleep(5)
        return ip
    # Submit tasks to each workgroup
    futures = []
    futures.append(task_reservation.remote())
    futures.append(task_dws_flex.remote())
    futures.append(task_spot.remote())
    results = ray.get(futures)
    print('Tasks successfully executed on nodes:', set(results))
    "
  # Automatically delete the RayCluster after the job finishes
  shutdownAfterJobFinishes: true
  rayClusterSpec:
    rayVersion: '2.9.0'
    # Enable the sidecar Ray autoscaler
    enableInTreeAutoscaling: true
    headGroupSpec:
      rayStartParams:
        dashboard-host: '0.0.0.0'
      template:
        spec:
          containers:
          - name: ray-head
            image: rayproject/ray:2.9.0
            resources:
              requests:
                cpu: "1"
                memory: "4Gi"
              limits:
                cpu: "1"
                memory: "4Gi"
    workerGroupSpecs:
    # Worker Group 1: Reservation GPU capacity
    - groupName: worker-group-reservation
      replicas: 0
      minReplicas: 0
      maxReplicas: 1
      rayStartParams:
        resources: '"{\\"group-reservation\\": 1}"'
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-nodepool: gpu-pool-reservation
            cloud.google.com/gke-accelerator: nvidia-tesla-t4
          containers:
          - name: ray-worker
            image: rayproject/ray:2.9.0
            resources:
              requests:
                nvidia.com/gpu: "1"
                cpu: "2"
                memory: "8Gi"
              limits:
                nvidia.com/gpu: "1"
                cpu: "2"
                memory: "8Gi"
    # Worker Group 2: DWS Flex GPU capacity
    - groupName: worker-group-dws-flex
      replicas: 0
      minReplicas: 0
      maxReplicas: 1
      rayStartParams:
        resources: '"{\\"group-dws-flex\\": 1}"'
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-nodepool: gpu-pool-dws-flex
            cloud.google.com/gke-accelerator: nvidia-tesla-t4
          containers:
          - name: ray-worker
            image: rayproject/ray:2.9.0
            resources:
              requests:
                nvidia.com/gpu: "1"
                cpu: "2"
                memory: "8Gi"
              limits:
                nvidia.com/gpu: "1"
                cpu: "2"
                memory: "8Gi"
    # Worker Group 3: Spot GPU capacity
    - groupName: worker-group-spot
      replicas: 0
      minReplicas: 0
      maxReplicas: 1
      rayStartParams:
        resources: '"{\\"group-spot\\": 1}"'
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-nodepool: gpu-pool-spot
            cloud.google.com/gke-accelerator: nvidia-tesla-t4
          containers:
          - name: ray-worker
            image: rayproject/ray:2.9.0
            resources:
              requests:
                nvidia.com/gpu: "1"
                cpu: "2"
                memory: "8Gi"
              limits:
                nvidia.com/gpu: "1"
                cpu: "2"
                memory: "8Gi"
# [END gke_ai_ml_ray_ephemeral_job_autoscaling]
