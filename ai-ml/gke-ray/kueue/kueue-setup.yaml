# [START gke_ai_ml_ray_kueue_setup]
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: reservation-flavor
spec:
  nodeLabels:
    cloud.google.com/gke-nodepool: gpu-pool-reservation
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: dws-flex-flavor
spec:
  nodeLabels:
    cloud.google.com/gke-nodepool: gpu-pool-dws-flex
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: spot-flavor
spec:
  nodeLabels:
    cloud.google.com/gke-nodepool: gpu-pool-spot
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: default-cpu-flavor
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: cluster-queue
spec:
  namespaceSelector: {} # Match all namespaces
  resourceGroups:
  - coveredResources: ["nvidia.com/gpu", "cpu", "memory"]
    flavors:
    - name: default-cpu-flavor
      resources:
      - name: "nvidia.com/gpu"
        nominalQuota: "0"
      - name: "cpu"
        nominalQuota: "8"
      - name: "memory"
        nominalQuota: "32Gi"
    - name: reservation-flavor
      resources:
      - name: "nvidia.com/gpu"
        nominalQuota: "1"
      - name: "cpu"
        nominalQuota: "4"
      - name: "memory"
        nominalQuota: "15Gi"
    - name: dws-flex-flavor
      resources:
      - name: "nvidia.com/gpu"
        nominalQuota: "1"
      - name: "cpu"
        nominalQuota: "4"
      - name: "memory"
        nominalQuota: "15Gi"
    - name: spot-flavor
      resources:
      - name: "nvidia.com/gpu"
        nominalQuota: "1"
      - name: "cpu"
        nominalQuota: "4"
      - name: "memory"
        nominalQuota: "15Gi"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: user-queue
  namespace: default
spec:
  clusterQueue: cluster-queue
# [END gke_ai_ml_ray_kueue_setup]
