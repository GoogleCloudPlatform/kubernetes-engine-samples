# Tell Prometheus to scrape Ray's metrics.
#
# Ray exports Prometheus metrics on port 8080 ("metrics") of every node (head and
# workers). The kube-prometheus-stack operator only scrapes PodMonitor objects
# whose labels match its podMonitorSelector, which defaults to the helm release
# name (here prometheus-stack). Without this object, Prometheus collects nothing
# from Ray and the dashboard's time-series charts stay empty.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ray-workloads
  namespace: prometheus-system
  labels:
    # Must match the operator's podMonitorSelector (helm release name).
    release: prometheus-stack
spec:
  # Watch Ray pods in the default namespace (where the RayService or RayCluster runs).
  namespaceSelector:
    matchNames:
    - default
  selector:
    matchLabels:
      ray.io/is-ray-node: "yes"
  podMetricsEndpoints:
  # Ray's metrics port is named "metrics" (8080) on the head and workers.
  - port: metrics
    interval: 15s
    path: /metrics
