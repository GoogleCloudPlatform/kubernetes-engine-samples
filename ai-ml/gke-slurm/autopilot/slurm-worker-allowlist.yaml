# [START gke_ai_ml_gke_slurm_autopilot_allowlist]

apiVersion: auto.gke.io/v1
kind: WorkloadAllowlist
metadata:
  name: slurm-worker-allowlist.yaml
  annotations:
    autopilot.gke.io/no-connect: "true"
exemptions:
  - autogke-default-linux-capabilities
  - autogke-disallow-privilege
matchingCriteria:
  initContainers:
    - name: logfile
      image: docker.io/library/alpine:latest
      command:
        - sh
        - -c
        - |
          #!/usr/bin/env sh
          # SPDX-FileCopyrightText: Copyright (C) SchedMD LLC.
          # SPDX-License-Identifier: Apache-2.0
          
          set -eu
          
          SOCKET="\${SOCKET:-"/tmp/logfile.log"}"
          
          mkdir -v -p "\$(dirname "\$SOCKET")"
          rm -f "\$SOCKET"
          if ! [ -f "\$SOCKET" ]; then
          __TAB__mkfifo -m 777 "\$SOCKET"
          fi
          while IFS="" read data; do
          __TAB__echo "\$data"
          done <"\$SOCKET"
      env:
        - name: SOCKET
      volumeMounts:
        - mountPath: /var/log/slurm
          name: slurm-logfile
  containers:
    - name: slurmd
      image: gcr.io/gke-release/slinky/slurmd:IMAGE_TAG
      args:
        - -Z
        - --conf-server
        - '^.*-controller\.[a-zA-Z0-9-]+:6817$'
        - --conf
        - "^'Features=[a-zA-Z0-9-]+'$"
      env:
        - name: POD_CPUS
        - name: POD_MEMORY
      securityContext:
        capabilities:
          add:
            - BPF
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_NICE
        privileged: true
      volumeMounts:
        - mountPath: /etc/slurm
          name: slurm-etc
          readOnly: true
        - mountPath: /var/log/slurm
          name: slurm-logfile
        - mountPath: /shared
          name: shared-dir
  volumes:
    - name: slurm-etc
    - name: slurm-logfile
    - name: shared-dir
      persistentVolumeClaim: {}

# [END gke_ai_ml_gke_slurm_autopilot_allowlist]