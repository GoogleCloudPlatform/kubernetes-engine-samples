# [START gke_ai_ml_gke_slurm_metrics_autoscaling_values]

imagePullPolicy: IfNotPresent

controller:
  slurmctld:
    image:
      repository: gcr.io/gke-release/slinky/slurmctld
      tag: TAG
  reconfigure:
    image:
      repository: gcr.io/gke-release/slinky/slurmctld
      tag: TAG
  logfile:
    image:
      repository: docker.io/library/alpine
      tag: latest
  persistence:
    enabled: true
    existingClaim: ""
    storageClassName: null
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 4Gi
  extraConf: null

  metadata:
    labels:
      app: slurmctld
  extraConfMap:
    SlurmctldDebug: verbose
    MetricsType: metrics/openmetrics
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

restapi:
  replicas: 1
  slurmrestd:
    image:
      repository: gcr.io/gke-release/slinky/slurmrestd
      tag: TAG
  podSpec:
    nodeSelector:
      kubernetes.io/os: linux

loginsets:
  slinky:
    enabled: true
    replicas: 1
    podSpec:
      tolerations:
        - key: "login-pool"
          operator: "Equal"
          value: "login-pods"
          effect: "NoSchedule"
      volumes:
        - name: home-vol
          persistentVolumeClaim:
            claimName: PVC_NAME
    login:
      image:
        repository: gcr.io/gke-release/slinky/login
        tag: TAG
      volumeMounts:
        - name: home-vol
          mountPath: /home

nodesets:
  slinky:
    enabled: false
  cpu-nodes:
    enabled: true
    replicas: 1
    updateStrategy:
      type: RollingUpdate
    slurmd:
      args: [" -N ${POD_NAME#slurm-worker-}"]
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
      image:
        repository: gcr.io/gke-release/slinky/slurmd
        tag: TAG
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: home-vol
          mountPath: /home
    logfile:
      image:
        repository: docker.io/library/alpine
        tag: latest
    partition:
      enabled: true
      useResourceLimits: true
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 25%
    podSpec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - key: "slurm-pool"
          operator: "Equal"
          value: "cpu-nodes"
          effect: "NoSchedule"
      nodeSelector:
        kubernetes.io/os: linux
      volumes:
        - name: home-vol
          persistentVolumeClaim:
            claimName: PVC_NAME
    taintKubeNodes: false

partitions:
  all:
    enabled: false
  cpu-partition:
    enabled: true
    nodesets:
      - cpu-nodes
    configMap:
      State: UP
      Default: "YES"
      MaxTime: UNLIMITED

# [END gke_ai_ml_gke_slurm_metrics_autoscaling_values]